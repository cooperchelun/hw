<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原神查詢系統 - 開始介面</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(
                180deg,
                #f5f8ff 0%,
                #dbe7ff 40%,
                #c8d9ff 100%
            );
            font-family: 'Noto Sans TC', sans-serif;
        }

        .menu-container {
            position: relative;
            width: 100vw;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-title {
            margin-bottom: 20px;
        }

        .game-title img {
            width: 600px;
            max-width: 90vw;
            height: auto;
            display: block;

            filter: drop-shadow(0 0 20px rgba(0,0,0,0.2));

            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .click-hint {
            margin-top: 30px;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #666;

            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;

            border: 2px solid rgba(255,255,255,0.6);

            background: radial-gradient(
                circle,
                rgba(255,255,255,0.4) 0%,
                rgba(255,255,255,0) 70%
            );

            transform: scale(0);

            animation: ripple-effect 0.8s ease-out;

            z-index: 9999;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .flash-overlay {
            position: fixed;
            inset: 0;

            background: white;

            opacity: 0;

            pointer-events: none;

            transition: opacity 0.5s ease;

            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="menu-container" id="menuContainer">

        <h1 class="game-title">
            <img src="genshin.png" alt="原神查詢系統">
        </h1>

        <div class="click-hint">
            ✦ 點擊任意地方進入 ✦
        </div>

    </div>

    <script>
        const container = document.getElementById('menuContainer');

        container.addEventListener('click', function(e) {

            createRipple(e);

            const flash = document.getElementById('flashOverlay');

            flash.style.opacity = '0.4';

            container.style.opacity = '0';
            container.style.transform = 'scale(1.1)';

            setTimeout(() => {
                flash.style.opacity = '0';
            }, 300);

            setTimeout(() => {

                // 改成你的主頁名稱
                // window.location.href = "search.html";

                showEntranceMessage();

            }, 800);
        });

        function createRipple(event) {

            const ripple = document.createElement('div');

            ripple.classList.add('ripple');

            const size = Math.max(
                window.innerWidth,
                window.innerHeight
            ) * 0.5;

            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';

            ripple.style.left =
                (event.clientX - size / 2) + 'px';

            ripple.style.top =
                (event.clientY - size / 2) + 'px';

            document.body.appendChild(ripple);

            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        }

        function showEntranceMessage() {

            const msgBox = document.createElement('div');

            msgBox.style.position = 'fixed';
            msgBox.style.top = '50%';
            msgBox.style.left = '50%';

            msgBox.style.transform =
                'translate(-50%, -50%)';

            msgBox.style.background =
                'rgba(15,11,28,0.95)';

            msgBox.style.border =
                '2px solid #00ffff';

            msgBox.style.padding =
                '30px 50px';

            msgBox.style.borderRadius =
                '16px';

            msgBox.style.color =
                '#ffffff';

            msgBox.style.fontSize =
                '1.5rem';

            msgBox.style.fontWeight =
                'bold';

            msgBox.style.textAlign =
                'center';

            msgBox.style.boxShadow =
                '0 0 30px rgba(0,255,255,0.3)';

            msgBox.style.zIndex =
                '10000';

            msgBox.innerHTML = `
                <p style="margin-bottom:15px;">
                    ✨ 正在連結提瓦特大陸... ✨
                </p>
                <span style="font-size:1rem;color:#aaaaaa;">
                    （此處可接續你的查詢系統）
                </span>
            `;

            document.body.appendChild(msgBox);

            setTimeout(() => {

                msgBox.style.opacity = '0';

                setTimeout(() => {

                    msgBox.remove();

                    container.style.opacity = '1';
                    container.style.transform = 'scale(1)';

                }, 500);

            }, 3000);
        }
    </script>

</body>
</html>
